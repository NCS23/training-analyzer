# ============================================================
# Trainingsplan — YAML Schema-Referenz
# ============================================================
#
# Dieses Dokument dient als vollständige Referenz für das
# YAML-Import-Format des Training Analyzers. Es ist so geschrieben,
# dass sowohl Menschen als auch KI-Systeme es lesen und daraus
# korrekte Trainingspläne erzeugen können.
#
# Import: Einstellungen → Trainingspläne → Importieren
# Validierung: Die App prüft das YAML vor dem Import auf Fehler.
#
# ============================================================
# SCHEMA-ÜBERSICHT
# ============================================================
#
# Ein Trainingsplan besteht aus:
#   1. Grunddaten (name, start_date, end_date)
#   2. Optionales Wettkampf-Ziel (goal)
#   3. Wochenstruktur (rest_days)
#   4. Phasen (phases[]) mit jeweils:
#      - Phasentyp und Wochen-Range
#      - Fokus und Ziel-Metriken
#      - Wochen-Template mit 7 Tagen (weekly_template[])
#        Jeder Tag hat optional Sessions mit run_details
#        und strukturierten Intervallen/Segmenten.
#
# PFLICHTFELDER sind mit (PFLICHT) markiert.
# Alle anderen Felder sind optional.
#
# ============================================================
# ERLAUBTE WERTE (Enums)
# ============================================================
#
# --- Session-Typen (run_type) ---
# Verwendet für: run_type in weekly_template und run_details
#
#   recovery     — Regenerationslauf (sehr locker, kurz)
#   easy         — Lockerer Dauerlauf (Grundlage, Zone 2)
#   long_run     — Langer Lauf (Umfang, aerobe Basis)
#   progression  — Steigerungslauf (beginnt locker, endet schnell)
#   tempo        — Tempodauerlauf (Schwellentempo, 20-40 min)
#   intervals    — Intervalltraining (strukturierte Belastungen)
#   repetitions  — Wiederholungsläufe (kurz + schnell, volle Erholung)
#   fartlek      — Fahrtspiel (unstrukturierte Tempowechsel)
#   race         — Wettkampf oder Wettkampfsimulation
#
# --- Segment-Typen (intervals[].type) ---
# Verwendet für: type in intervals[] Blöcken
#
#   warmup       — Einlaufen (lockerer Start, 5-15 min)
#   cooldown     — Auslaufen (lockeres Ende, 5-15 min)
#   steady       — Gleichmäßiges Tempo (z.B. Dauerlauf-Abschnitt)
#   work         — Belastungsintervall (schnelles Tempo)
#   recovery_jog — Trabpause zwischen Intervallen
#   rest         — Gehpause (komplett)
#   strides      — Steigerungsläufe (80-100m, 8-10x)
#   drills       — Lauf-ABC / Technikübungen
#
# --- Phasentypen (phases[].type) ---
#
#   base         — Grundlagenphase (Umfang aufbauen, aerobe Basis)
#   build        — Aufbauphase (Intensität steigern)
#   peak         — Wettkampfphase (höchste Intensität, Wettkampftempo)
#   taper        — Tapering (Umfang reduzieren, Frische gewinnen)
#   transition   — Übergangsphase (aktive Erholung)
#
# --- Trainingstypen (weekly_template[].type) ---
#
#   running      — Laufsession
#   strength     — Krafttraining
#
# ============================================================
# PACE-FORMAT
# ============================================================
#
# Pace wird im Format M:SS angegeben (Minuten:Sekunden pro km).
# Beispiele: "5:30" = 5 min 30 sek/km, "4:15" = 4 min 15 sek/km
#
# target_pace_min = schnelleres Ende der Pace-Range (niedrigerer Wert)
# target_pace_max = langsameres Ende der Pace-Range (höherer Wert)
#
# Beispiel: target_pace_min: "5:30", target_pace_max: "6:00"
#   → Läufer soll zwischen 5:30 und 6:00 min/km laufen
#
# ============================================================
# INTERVALL-FELDER
# ============================================================
#
# Jedes Intervall in intervals[] unterstützt folgende Felder:
#
#   type             (PFLICHT) — Segment-Typ (siehe oben)
#   duration_minutes (BEDINGT) — Dauer in Minuten (>0, max 180)
#   distance_km      (BEDINGT) — Distanz in km (>0, max 100)
#     → Mindestens duration_minutes ODER distance_km muss gesetzt sein.
#     → Beide können auch gleichzeitig gesetzt sein.
#   target_pace_min  — Schnelleres Pace-Ende (M:SS)
#   target_pace_max  — Langsameres Pace-Ende (M:SS)
#   target_hr_min    — Untere HR-Grenze (60-220 bpm)
#   target_hr_max    — Obere HR-Grenze (60-220 bpm)
#   repeats          — Wiederholungen (Standard: 1, max 50)
#   notes            — Freitext-Notiz (max 500 Zeichen)
#   exercise_name    — Übungsname bei drills/strides (max 100 Zeichen)
#
# Verfügbare Drill-Übungen (exercise_name):
#   Kniehebelauf, Anfersen, Skippings, Seitgalopp, Hopserlauf,
#   Fußgelenksarbeit, Prellhopser, Sprunglauf, Steigerungslauf,
#   Seitwärts überkreuzen, Seitsprünge, Rückwärtslaufen,
#   B-Skip, High Kicks, Wechselsprünge, Vorderfußsprünge
#
# ============================================================
# BEGINN DER VORLAGE
# ============================================================

# --- Plan-Grunddaten ---

name: "HM Sub-2h Vorbereitung"         # (PFLICHT) Name des Trainingsplans
description: "16-Wochen Plan für den Hamburg Halbmarathon. Periodisierung nach Daniels."
start_date: 2026-04-06                  # (PFLICHT) Startdatum (YYYY-MM-DD)
end_date: 2026-07-26                    # (PFLICHT) Enddatum (YYYY-MM-DD)
target_event_date: 2026-07-26           # Wettkampf-/Zieldatum
status: draft                           # draft | active | completed | paused (Standard: draft)

# --- Ziel (automatisch erstellt falls nicht vorhanden) ---
# Wenn ein Ziel mit demselben Titel existiert, wird es verknüpft.
# Andernfalls wird ein neues Ziel angelegt.

goal:
  title: "Hamburg Halbmarathon"          # (PFLICHT) Titel des Ziels
  distance_km: 21.1                      # (PFLICHT) Distanz in km
  target_time: "1:59:00"                 # (PFLICHT) Zielzeit als H:MM:SS oder MM:SS
                                         #   Alternativ: target_time_seconds: 7140
  race_date: 2026-07-26                  # Wettkampfdatum (Standard: target_event_date oder end_date)

# Alternativ: Bestehendes Ziel per ID oder Titel referenzieren
# goal_id: 5                            # Direkte ID-Referenz
# goal_title: "Hamburg Halbmarathon"     # Titel-Lookup (nur Verknüpfung, kein Auto-Create)

# --- Wochenstruktur ---

weekly_structure:
  rest_days: [0, 6]                      # Ruhetage: 0=Montag, 6=Sonntag

# --- Phasen ---
# Mindestens eine Phase ist erforderlich.
# Phasen decken den Zeitraum von start_date bis end_date ab.
# start_week/end_week sind 1-basiert (Woche 1 = erste Woche des Plans).

phases:

  # ──────────────────────────────────────
  # PHASE 1: Grundlagenaufbau (base)
  # ──────────────────────────────────────
  - name: "Grundlagenaufbau"
    type: base
    start_week: 1
    end_week: 6
    focus:
      primary: ["aerobic_base", "structural_adaptation"]
      secondary: ["running_economy", "injury_prevention"]
    target_metrics:
      weekly_volume_min: 30              # km pro Woche (Minimum)
      weekly_volume_max: 45              # km pro Woche (Maximum)
      quality_sessions_per_week: 1       # Qualitätssessions (Intervall, Tempo etc.)
      strength_sessions_per_week: 2      # Kraft-Sessions pro Woche
    notes: "Langsamer Umfangaufbau, max. 10% Steigerung pro Woche."

    # weekly_template: 7 Tage (day: 0=Mo bis 6=So)
    # Jeder Tag ist entweder rest: true oder hat type + optionale Details.
    weekly_template:

      # Montag: Ruhetag
      - day: 0
        rest: true

      # Dienstag: Einfacher Dauerlauf
      - day: 1
        type: running
        run_type: easy
        run_details:
          run_type: easy
          target_duration_minutes: 45
          target_pace_min: "5:40"
          target_pace_max: "6:10"

      # Mittwoch: Krafttraining
      - { day: 2, type: strength }

      # Donnerstag: Lockerer Lauf
      - { day: 3, type: running, run_type: easy }

      # Freitag: Krafttraining
      - { day: 4, type: strength }

      # Samstag: Langer Lauf
      - day: 5
        type: running
        run_type: long_run
        run_details:
          run_type: long_run
          target_duration_minutes: 80
          target_pace_min: "6:00"
          target_pace_max: "6:30"
          target_hr_min: 140
          target_hr_max: 155

      # Sonntag: Ruhetag
      - { day: 6, rest: true }

  # ──────────────────────────────────────
  # PHASE 2: Spezifischer Aufbau (build)
  # ──────────────────────────────────────
  - name: "Spezifischer Aufbau"
    type: build
    start_week: 7
    end_week: 11
    focus:
      primary: ["lactate_threshold", "tempo_hardness"]
      secondary: ["specific_strength", "race_pace_intro"]
    target_metrics:
      weekly_volume_min: 40
      weekly_volume_max: 55
      quality_sessions_per_week: 2
      strength_sessions_per_week: 1
    notes: "Tempoläufe und Schwellentraining einführen."
    weekly_template:
      - { day: 0, type: running, run_type: easy }
      - { day: 1, type: strength }
      - { day: 2, type: running, run_type: tempo }
      - { day: 3, type: running, run_type: easy }
      - { day: 4, type: running, run_type: easy }
      - { day: 5, type: running, run_type: long_run }
      - { day: 6, rest: true }

  # ──────────────────────────────────────
  # PHASE 3: Wettkampfvorbereitung (peak)
  # Beispiel mit strukturierten Intervallen
  # ──────────────────────────────────────
  - name: "Wettkampfvorbereitung"
    type: peak
    start_week: 12
    end_week: 14
    focus:
      primary: ["vo2max", "race_pace"]
    target_metrics:
      weekly_volume_min: 45
      weekly_volume_max: 55
      quality_sessions_per_week: 2
      strength_sessions_per_week: 1
    notes: "Wettkampf-spezifische Einheiten. Höchste Intensität."
    weekly_template:
      - { day: 0, type: running, run_type: easy }

      # ── Beispiel: Intervall-Session mit intervals[] ──
      - day: 1
        type: running
        run_type: intervals
        run_details:
          run_type: intervals
          target_duration_minutes: 60
          intervals:
            - type: warmup
              duration_minutes: 10
              target_pace_min: "5:40"
              target_pace_max: "6:00"
              repeats: 1
            - type: work
              duration_minutes: 3
              target_pace_min: "4:20"
              target_pace_max: "4:35"
              target_hr_min: 170
              target_hr_max: 185
              repeats: 5
              notes: "VO2max-Intervalle, Fokus auf gleichmäßiges Tempo"
            - type: recovery_jog
              duration_minutes: 2
              target_pace_min: "6:00"
              target_pace_max: "6:30"
              repeats: 5
            - type: cooldown
              duration_minutes: 10
              target_pace_min: "5:40"
              target_pace_max: "6:00"
              repeats: 1

      - { day: 2, type: running, run_type: easy }

      # ── Beispiel: Distanz-basierte Intervalle (400m) ──
      - day: 3
        type: running
        run_type: repetitions
        run_details:
          run_type: repetitions
          target_duration_minutes: 50
          intervals:
            - type: warmup
              duration_minutes: 10
              target_pace_min: "5:40"
              target_pace_max: "6:00"
            - type: work
              distance_km: 0.4
              target_pace_min: "3:50"
              target_pace_max: "4:00"
              repeats: 8
              notes: "400m Wiederholungen, volle Erholung dazwischen"
            - type: recovery_jog
              duration_minutes: 3
              repeats: 8
            - type: cooldown
              duration_minutes: 10
              target_pace_min: "6:00"
              target_pace_max: "6:30"

      - { day: 4, type: strength }
      - { day: 5, type: running, run_type: long_run }
      - { day: 6, rest: true }

  # ──────────────────────────────────────
  # PHASE 4: Tapering
  # ──────────────────────────────────────
  - name: "Tapering"
    type: taper
    start_week: 15
    end_week: 16
    focus:
      primary: ["supercompensation", "fatigue_reduction"]
    target_metrics:
      weekly_volume_min: 20
      weekly_volume_max: 35
      quality_sessions_per_week: 1
      strength_sessions_per_week: 0
    notes: "Umfang um 40-60% reduzieren. Frische für den Wettkampf."
    weekly_template:
      - { day: 0, type: running, run_type: easy }

      # ── Beispiel: Steigerungsläufe (strides) ──
      - day: 1
        type: running
        run_type: easy
        run_details:
          run_type: easy
          target_duration_minutes: 35
          intervals:
            - type: steady
              duration_minutes: 25
              target_pace_min: "5:40"
              target_pace_max: "6:00"
            - type: strides
              distance_km: 0.1
              repeats: 6
              notes: "6x100m Steigerungen, locker beginnen, bis 90% steigern"

      - { day: 2, rest: true }

      # ── Beispiel: Lauf-ABC / Drills ──
      - day: 3
        type: running
        run_type: easy
        run_details:
          run_type: easy
          target_duration_minutes: 30
          intervals:
            - type: warmup
              duration_minutes: 10
              target_pace_min: "6:00"
              target_pace_max: "6:30"
            - type: drills
              duration_minutes: 1
              exercise_name: "Kniehebelauf"
              notes: "Knie hüfthoch, Vorderfuß-Aufsatz"
              repeats: 2
            - type: drills
              duration_minutes: 1
              exercise_name: "Anfersen"
              notes: "Fersen zum Gesäß, Oberkörper aufrecht"
              repeats: 2
            - type: drills
              duration_minutes: 1
              exercise_name: "Skippings"
              notes: "Maximale Frequenz, kurze Bodenkontaktzeit"
              repeats: 2
            - type: cooldown
              duration_minutes: 10
              target_pace_min: "6:00"
              target_pace_max: "6:30"

      - { day: 4, rest: true }
      - { day: 5, type: running, run_type: easy }
      - { day: 6, rest: true }
