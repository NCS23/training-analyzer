# Halbmarathon Sub-2h Trainingsplan
# Basierend auf TRAINING_CONTEXT.md
# KW06-13 (8 Wochen, Feb-März 2026)

name: "HM Sub-2h Vorbereitung"
description: "8-Wochen Halbmarathon-Plan: Aufbau → Spezifisch → Tapering. Ziel: Sub-2h (< 1:59:59)."
start_date: "2026-02-02"
end_date: "2026-03-29"
target_event_date: "2026-03-28"
status: draft

goal:
  title: "Halbmarathon Sub-2h"
  race_date: "2026-03-28"
  distance_km: 21.1
  target_time: "1:59:59"

weekly_structure:
  rest_days: [0, 6]

phases:
  # Phase 1: Aufbau & Stabilisierung (KW06-08)
  - name: "Aufbau & Stabilisierung"
    type: base
    start_week: 1
    end_week: 3
    notes: "Wiedereinstieg nach Winterpause. Tempo vor Progression - Struktur zuerst stabilisieren."
    weekly_template:
      # Montag: Ruhetag
      - day: 0
        rest: true
      # Dienstag: Kraft (kniedominant)
      - day: 1
        type: strength
        notes: "Kniebeugen 2x6@16kg, Bankdrücken 2x6@18kg, Core, Ruderzug"
      # Mittwoch: Qualität (Intervalle)
      - day: 2
        type: running
        run_type: intervals
        run_details:
          run_type: intervals
          target_duration_minutes: 40
          intervals:
            - type: warmup
              duration_minutes: 10
              target_pace_min: "7:00"
              target_pace_max: "7:30"
              repeats: 1
            - type: work
              duration_minutes: 3
              target_pace_min: "6:21"
              target_pace_max: "6:31"
              repeats: 5
            - type: recovery_jog
              duration_minutes: 2
              target_pace_min: "7:30"
              target_pace_max: "8:00"
              repeats: 5
            - type: cooldown
              duration_minutes: 5
              target_pace_min: "7:00"
              target_pace_max: "7:30"
              repeats: 1
      # Donnerstag: Lockerer Lauf
      - day: 3
        type: running
        run_type: easy
        run_details:
          run_type: easy
          target_duration_minutes: 50
          target_pace_min: "7:00"
          target_pace_max: "7:30"
          target_hr_max: 150
      # Freitag: Kraft (hueftdominant)
      - day: 4
        type: strength
        notes: "Kreuzheben 3x6@16kg, Brustpresse, Bauch, Rudern Ergometer"
      # Samstag: Longrun
      - day: 5
        type: running
        run_type: long_run
        run_details:
          run_type: long_run
          target_duration_minutes: 80
          target_pace_min: "6:30"
          target_pace_max: "6:50"
          target_hr_min: 150
          target_hr_max: 160
      # Sonntag: Ruhetag
      - day: 6
        rest: true

  # Phase 2: Spezifisch (KW09-11)
  - name: "Spezifische Vorbereitung"
    type: build
    start_week: 4
    end_week: 6
    notes: "Annäherung an Wettkampftempo 5:41/km. Longrun mit Tempo-Passagen."
    weekly_template:
      # Montag: Ruhetag
      - day: 0
        rest: true
      # Dienstag: Kraft (kniedominant)
      - day: 1
        type: strength
        notes: "Gewichte beibehalten, kein Steigern mehr"
      # Mittwoch: Spezifische Intervalle
      - day: 2
        type: running
        run_type: intervals
        run_details:
          run_type: intervals
          target_duration_minutes: 50
          intervals:
            - type: warmup
              duration_minutes: 10
              target_pace_min: "6:30"
              target_pace_max: "7:00"
              repeats: 1
            - type: work
              duration_minutes: 4
              target_pace_min: "5:40"
              target_pace_max: "5:50"
              repeats: 5
            - type: recovery_jog
              duration_minutes: 2
              target_pace_min: "7:00"
              target_pace_max: "7:30"
              repeats: 5
            - type: cooldown
              duration_minutes: 5
              target_pace_min: "6:30"
              target_pace_max: "7:00"
              repeats: 1
      # Donnerstag: Lockerer Lauf
      - day: 3
        type: running
        run_type: easy
        run_details:
          run_type: easy
          target_duration_minutes: 50
          target_pace_min: "6:30"
          target_pace_max: "7:00"
          target_hr_max: 150
      # Freitag: Kraft (hueftdominant)
      - day: 4
        type: strength
        notes: "Kreuzheben, Brustpresse, Bauch — Gewichte halten"
      # Samstag: Longrun mit Tempo-Passage
      - day: 5
        type: running
        run_type: long_run
        run_details:
          run_type: long_run
          target_duration_minutes: 100
          intervals:
            - type: steady
              duration_minutes: 60
              target_pace_min: "6:20"
              target_pace_max: "6:40"
              repeats: 1
            - type: work
              duration_minutes: 25
              target_pace_min: "5:45"
              target_pace_max: "6:00"
              repeats: 1
            - type: cooldown
              duration_minutes: 15
              target_pace_min: "6:30"
              target_pace_max: "7:00"
              repeats: 1
      # Sonntag: Ruhetag
      - day: 6
        rest: true

  # Phase 3: Tapering (KW12-13)
  - name: "Tapering"
    type: taper
    start_week: 7
    end_week: 8
    notes: "Umfang -40%, Intensität erhalten. Form kommt in der Erholung!"
    weekly_template:
      # Montag: Ruhetag
      - day: 0
        rest: true
      # Dienstag: Kraft leicht
      - day: 1
        type: strength
        notes: "Leichtes Studio — Gewichte NICHT steigern!"
      # Mittwoch: Kurze scharfe Intervalle
      - day: 2
        type: running
        run_type: intervals
        run_details:
          run_type: intervals
          target_duration_minutes: 30
          intervals:
            - type: warmup
              duration_minutes: 10
              target_pace_min: "6:30"
              target_pace_max: "7:00"
              repeats: 1
            - type: work
              duration_minutes: 3
              target_pace_min: "5:30"
              target_pace_max: "5:40"
              repeats: 4
            - type: recovery_jog
              duration_minutes: 2
              target_pace_min: "7:00"
              target_pace_max: "7:30"
              repeats: 4
            - type: cooldown
              duration_minutes: 5
              target_pace_min: "7:00"
              target_pace_max: "7:30"
              repeats: 1
      # Donnerstag: Lockerer kurzer Lauf
      - day: 3
        type: running
        run_type: recovery
        run_details:
          run_type: recovery
          target_duration_minutes: 30
          target_pace_min: "7:00"
          target_pace_max: "7:30"
          target_hr_max: 145
      # Freitag: Ruhe oder Mobilisierung
      - day: 4
        rest: true
        notes: "Nur Mobilisierung, kein Krafttraining"
      # Samstag: Letzter langer Lauf (reduziert)
      - day: 5
        type: running
        run_type: long_run
        run_details:
          run_type: long_run
          target_duration_minutes: 75
          target_pace_min: "6:20"
          target_pace_max: "6:40"
          target_hr_max: 155
      # Sonntag: Ruhetag
      - day: 6
        rest: true
