name: Deploy to NAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment on host
        run: |
          # Execute deploy script on host via docker exec
          docker exec -w /volume1/docker/training-analyzer training-analyzer-backend bash -c "
            echo '🚀 Starting deployment...'
            cd /volume1/docker/training-analyzer
            su - NCSNASadmin -c 'cd /volume1/docker/training-analyzer && git pull origin main' 2>&1 | grep -v 'postgres-data' || true
            docker-compose up -d --build backend frontend
            echo '✅ Deployment complete!'
            docker-compose ps
          "
