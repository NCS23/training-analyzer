name: Deploy to NAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy application
        run: |
          echo "🚀 Starting deployment..."
          
          cd /workspace/training-analyzer
          git pull origin main 2>&1 | grep -v 'postgres-data' || true
          
          docker-compose up -d --build backend frontend
          
          echo "✅ Deployment complete!"
          docker-compose ps
