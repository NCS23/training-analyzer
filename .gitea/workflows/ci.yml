name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════
  # FRONTEND QUALITY GATES
  # ═══════════════════════════════════════════════════════
  frontend-lint:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npx eslint src/ --ext ts,tsx --report-unused-disable-directives --max-warnings 0

      - name: Prettier check
        working-directory: frontend
        run: npx prettier --check "src/**/*.{ts,tsx,css}"

      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc --noEmit

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: frontend
        run: npx vitest --run --coverage --passWithNoTests

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ═══════════════════════════════════════════════════════
  # BACKEND QUALITY GATES
  # ═══════════════════════════════════════════════════════
  backend-lint:
    name: Backend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python & pip
        run: |
          apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv > /dev/null 2>&1 || true

      - name: Install dependencies
        working-directory: backend
        run: |
          python3 -m pip install --break-system-packages -e ".[dev]" || pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: backend
        run: ruff check app/

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check app/

      - name: Mypy typecheck
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python & pip
        run: |
          apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv > /dev/null 2>&1 || true

      - name: Install dependencies
        working-directory: backend
        run: |
          python3 -m pip install --break-system-packages -e ".[dev]" || pip install -e ".[dev]"

      - name: Run tests with coverage
        working-directory: backend
        run: pytest app/tests/ -x --cov=app --cov-report=term-missing --cov-fail-under=80

  # ═══════════════════════════════════════════════════════
  # DEPLOYMENT (nur auf main)
  # ═══════════════════════════════════════════════════════
  deploy:
    name: Deploy to NAS
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-lint, backend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Docker
        run: |
          echo "Deployment wird spaeter konfiguriert"
          # /workspace/training-analyzer/deploy-from-runner.sh
