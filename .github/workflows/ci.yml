name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  # Frontend Quality Gates
  frontend-lint:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npx eslint src/ --max-warnings 0

      - name: Prettier check
        working-directory: frontend
        run: npx prettier --check "src/**/*.{ts,tsx,css}"

      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc --noEmit

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: frontend
        run: npx vitest --run --coverage --coverage.reporter=json-summary --coverage.reporter=text --passWithNoTests

      - name: Coverage Summary
        if: always()
        working-directory: frontend
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Frontend Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (v) => v.pct >= 80 ? '✅' : v.pct >= 60 ? '⚠️' : '❌';
              console.log('| Metric | Coverage | Status |');
              console.log('|--------|----------|--------|');
              console.log('| Statements | ' + c.statements.pct + '% | ' + fmt(c.statements) + ' |');
              console.log('| Branches | ' + c.branches.pct + '% | ' + fmt(c.branches) + ' |');
              console.log('| Functions | ' + c.functions.pct + '% | ' + fmt(c.functions) + ' |');
              console.log('| Lines | ' + c.lines.pct + '% | ' + fmt(c.lines) + ' |');
            " >> $GITHUB_STEP_SUMMARY
          fi

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # Backend Quality Gates
  backend-lint:
    name: Backend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install ".[dev]"

      - name: Ruff lint
        working-directory: backend
        run: ruff check app/

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check app/

      - name: Mypy typecheck
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install ".[dev]"

      - name: Run tests with coverage
        working-directory: backend
        run: |
          if [ -d "app/tests" ]; then
            pytest app/tests/ -x --cov=app --cov-report=term-missing --cov-report=json:coverage.json
          else
            echo "No test directory found - skipping tests"
          fi

      - name: Coverage Summary
        if: always()
        working-directory: backend
        run: |
          if [ -f coverage.json ]; then
            echo "## Backend Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          with open('coverage.json') as f:
              data = json.load(f)
          totals = data['totals']
          pct = totals['percent_covered_display']
          stmts = totals['num_statements']
          miss = totals['missing_lines']
          icon = '✅' if float(pct) >= 80 else '⚠️' if float(pct) >= 60 else '❌'
          print(f'| Metric | Value | Status |')
          print(f'|--------|-------|--------|')
          print(f'| Coverage | {pct}% | {icon} |')
          print(f'| Statements | {stmts} | |')
          print(f'| Missed Lines | {miss} | |')
            " >> $GITHUB_STEP_SUMMARY
          fi

  # Deploy to Coolify after all checks pass (main branch only)
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-lint, backend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl -s -X POST "${{ secrets.COOLIFY_URL }}/api/v1/deploy" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"uuid":"${{ secrets.COOLIFY_APP_UUID }}"}'

  # Verify deployment is healthy before running E2E tests
  deploy-verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Warte auf Deployment und prüfe Health
        id: health
        env:
          PROD_URL: http://training.89.167.78.223.sslip.io
        run: |
          echo "Warte 30s auf Coolify Build-Start..."
          sleep 30

          echo "Polling $PROD_URL/health alle 15 Sekunden (max 5 Minuten)..."

          HEALTHY=false
          for i in $(seq 1 20); do
            echo "Versuch $i/20..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/health" --connect-timeout 5 --max-time 10 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              BODY=$(curl -s "$PROD_URL/health" --connect-timeout 5 --max-time 10 2>/dev/null || echo "{}")
              STATUS=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")

              DB=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('database',''))" 2>/dev/null || echo "")

              if [ "$STATUS" = "ok" ] && [ "$DB" = "True" ]; then
                echo "Health Check bestanden (Versuch $i) — DB verbunden"
                HEALTHY=true
                break
              else
                echo "HTTP 200 aber status='$STATUS', database='$DB': $BODY"
              fi
            else
              echo "HTTP $HTTP_CODE — noch nicht bereit"
            fi

            sleep 15
          done

          echo "healthy=$HEALTHY" >> $GITHUB_OUTPUT

          if [ "$HEALTHY" = "false" ]; then
            echo "::error::Deployment Health Check fehlgeschlagen nach 5 Minuten"
            exit 1
          fi

      - name: Prüfe Frontend liefert HTML
        env:
          PROD_URL: http://training.89.167.78.223.sslip.io
        run: |
          CONTENT_TYPE=$(curl -s -o /dev/null -w "%{content_type}" "$PROD_URL/" --max-time 10)
          if echo "$CONTENT_TYPE" | grep -q "text/html"; then
            echo "Frontend liefert HTML aus"
          else
            echo "::error::Frontend liefert kein HTML: $CONTENT_TYPE"
            exit 1
          fi

      - name: Frontend SPA Warmup
        env:
          PROD_URL: http://training.89.167.78.223.sslip.io
        run: |
          echo "Lade SPA-Routen vor um JS-Bundle-Caching sicherzustellen..."

          # Retry-Logik: JS-Bundles können nach Deploy kurz verzögert sein
          BUNDLES_OK=false
          for attempt in 1 2 3 4 5; do
            echo ""
            echo "--- Versuch $attempt/5 ---"
            FAILED=false

            HTML=$(curl -s "$PROD_URL/" --max-time 15)
            JS_ASSETS=$(echo "$HTML" | grep -oE '/assets/[^"]+\.js' | head -5)

            if [ -z "$JS_ASSETS" ]; then
              echo "Keine JS-Assets in index.html gefunden"
              FAILED=true
            else
              for asset in $JS_ASSETS; do
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL$asset" --max-time 10 2>/dev/null || echo "000")
                if [ "$HTTP_CODE" = "200" ]; then
                  echo "  ✓ $asset"
                else
                  echo "  ✗ $asset (HTTP $HTTP_CODE)"
                  FAILED=true
                fi
              done
            fi

            if [ "$FAILED" = "false" ]; then
              BUNDLES_OK=true
              echo "Alle JS-Bundles erreichbar"
              break
            fi

            if [ "$attempt" -lt 5 ]; then
              echo "Warte 15s vor nächstem Versuch..."
              sleep 15
            fi
          done

          if [ "$BUNDLES_OK" = "false" ]; then
            echo "::error::JS-Bundles nach 5 Versuchen nicht erreichbar"
            exit 1
          fi

          # Warmup: Alle SPA-Routen einmal laden
          for route in /dashboard /sessions /analyse /plan /profile; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL$route" --max-time 10 2>/dev/null || echo "000")
            echo "Warmup $route → HTTP $HTTP_CODE"
          done

          echo "Frontend Warmup abgeschlossen"

      - name: Kommentar auf verlinktes Issue
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          ISSUE_NUM=$(echo "$COMMIT_MSG" | head -1 | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          set -e
          if [ -n "$ISSUE_NUM" ]; then
            gh issue comment "$ISSUE_NUM" -R "$REPO" \
              --body "Deployed und verifiziert. Health Check bestanden. CI Run: $RUN_URL" || true
          fi

      - name: Deployment Summary
        if: always()
        env:
          HEALTH_RESULT: ${{ steps.health.outputs.healthy }}
        run: |
          echo "## Deployment Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$HEALTH_RESULT" = "true" ]; then
            echo "| Status | Healthy |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | FAILED |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "URL: http://training.89.167.78.223.sslip.io" >> $GITHUB_STEP_SUMMARY

  # E2E Smoke Tests against production
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-verify]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm install

      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Smoke Tests ausführen
        id: e2e
        working-directory: e2e
        env:
          BASE_URL: http://training.89.167.78.223.sslip.io
        run: npx playwright test

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: E2E Summary
        if: always()
        env:
          E2E_RESULT: ${{ steps.e2e.outcome }}
        run: |
          echo "## E2E Smoke Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$E2E_RESULT" = "success" ]; then
            echo "| Status | Bestanden |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | FAILED |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Viewports | Mobile (375x812) + Desktop (1280x800) |" >> $GITHUB_STEP_SUMMARY
          echo "| Report | Siehe Artefakt 'e2e-smoke-report' |" >> $GITHUB_STEP_SUMMARY

  # Failure notification — creates GitHub Issue on deploy/verify/e2e failure
  deploy-notify:
    name: Failure Notification
    runs-on: ubuntu-latest
    needs: [deploy, deploy-verify, e2e-smoke]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      (needs.deploy.result == 'failure' || needs.deploy-verify.result == 'failure' || needs.e2e-smoke.result == 'failure')
    steps:
      - name: Fehlerquelle bestimmen
        id: failure
        env:
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          VERIFY_RESULT: ${{ needs.deploy-verify.result }}
          E2E_RESULT: ${{ needs.e2e-smoke.result }}
        run: |
          if [ "$DEPLOY_RESULT" = "failure" ]; then
            echo "title=[CI] Deploy fehlgeschlagen" >> $GITHUB_OUTPUT
            echo "detail=Coolify Deployment API-Aufruf fehlgeschlagen." >> $GITHUB_OUTPUT
          elif [ "$VERIFY_RESULT" = "failure" ]; then
            echo "title=[CI] Deploy-Verifikation fehlgeschlagen" >> $GITHUB_OUTPUT
            echo "detail=Health Check der Produktion nach Deploy nicht erfolgreich (5 Min Timeout)." >> $GITHUB_OUTPUT
          elif [ "$E2E_RESULT" = "failure" ]; then
            echo "title=[CI] E2E Smoke Tests fehlgeschlagen" >> $GITHUB_OUTPUT
            echo "detail=Playwright Smoke Tests gegen Produktion fehlgeschlagen." >> $GITHUB_OUTPUT
          fi

      - name: Prüfe ob Issue bereits existiert
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: ${{ steps.failure.outputs.title }}
        run: |
          EXISTING=$(gh issue list -R "${{ github.repository }}" --state open --search "\"$ISSUE_TITLE\" in:title" --json number --jq '.[0].number // empty' 2>/dev/null || echo "")
          echo "issue_number=$EXISTING" >> $GITHUB_OUTPUT

      - name: GitHub Issue erstellen oder kommentieren
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          ISSUE_TITLE: ${{ steps.failure.outputs.title }}
          ISSUE_DETAIL: ${{ steps.failure.outputs.detail }}
          EXISTING_ISSUE: ${{ steps.existing.outputs.issue_number }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"

          BODY="## CI Failure

          ${ISSUE_DETAIL}

          **Commit:** \`${SHORT_SHA}\`
          **CI Run:** ${RUN_URL}
          **Zeitpunkt:** $(date -u '+%Y-%m-%d %H:%M UTC')

          ### Nächste Schritte
          1. CI Run Log prüfen
          2. Produktion manuell testen: http://training.89.167.78.223.sslip.io
          3. Bei Bedarf: Coolify Dashboard prüfen (Port 8000)"

          if [ -n "$EXISTING_ISSUE" ]; then
            gh issue comment "$EXISTING_ISSUE" -R "$REPO" \
              --body "Erneutes Auftreten:

          ${BODY}"
            echo "Kommentar auf bestehendes Issue #${EXISTING_ISSUE}"
          else
            gh issue create -R "$REPO" \
              --title "$ISSUE_TITLE" \
              --body "$BODY" \
              --label "bug"
            echo "Neues Failure-Issue erstellt"
          fi
