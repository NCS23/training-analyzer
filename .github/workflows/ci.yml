name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Frontend Quality Gates
  frontend-lint:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npx eslint src/ --max-warnings 0

      - name: Prettier check
        working-directory: frontend
        run: npx prettier --check "src/**/*.{ts,tsx,css}"

      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc --noEmit

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: frontend
        run: npx vitest --run --coverage --coverage.reporter=json-summary --coverage.reporter=text --passWithNoTests

      - name: Coverage Summary
        if: always()
        working-directory: frontend
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Frontend Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (v) => v.pct >= 80 ? '✅' : v.pct >= 60 ? '⚠️' : '❌';
              console.log('| Metric | Coverage | Status |');
              console.log('|--------|----------|--------|');
              console.log('| Statements | ' + c.statements.pct + '% | ' + fmt(c.statements) + ' |');
              console.log('| Branches | ' + c.branches.pct + '% | ' + fmt(c.branches) + ' |');
              console.log('| Functions | ' + c.functions.pct + '% | ' + fmt(c.functions) + ' |');
              console.log('| Lines | ' + c.lines.pct + '% | ' + fmt(c.lines) + ' |');
            " >> $GITHUB_STEP_SUMMARY
          fi

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # Backend Quality Gates
  backend-lint:
    name: Backend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install ".[dev]"

      - name: Ruff lint
        working-directory: backend
        run: ruff check app/

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check app/

      - name: Mypy typecheck
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install ".[dev]"

      - name: Run tests with coverage
        working-directory: backend
        run: |
          if [ -d "app/tests" ]; then
            pytest app/tests/ -x --cov=app --cov-report=term-missing --cov-report=json:coverage.json
          else
            echo "No test directory found - skipping tests"
          fi

      - name: Coverage Summary
        if: always()
        working-directory: backend
        run: |
          if [ -f coverage.json ]; then
            echo "## Backend Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          with open('coverage.json') as f:
              data = json.load(f)
          totals = data['totals']
          pct = totals['percent_covered_display']
          stmts = totals['num_statements']
          miss = totals['missing_lines']
          icon = '✅' if float(pct) >= 80 else '⚠️' if float(pct) >= 60 else '❌'
          print(f'| Metric | Value | Status |')
          print(f'|--------|-------|--------|')
          print(f'| Coverage | {pct}% | {icon} |')
          print(f'| Statements | {stmts} | |')
          print(f'| Missed Lines | {miss} | |')
            " >> $GITHUB_STEP_SUMMARY
          fi

  # Deploy to Coolify after all checks pass (main branch only)
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-lint, backend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl -s -X POST "${{ secrets.COOLIFY_URL }}/api/v1/deploy" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"uuid":"${{ secrets.COOLIFY_APP_UUID }}"}'
