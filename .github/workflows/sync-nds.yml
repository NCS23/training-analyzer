name: Sync NDS Packages

on:
  repository_dispatch:
    types: [nds-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Update NDS packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout NDS
        uses: actions/checkout@v6
        with:
          repository: NCS23/nordlig-design-system
          path: nds
          token: ${{ secrets.NDS_CHECKOUT_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build NDS packages
        working-directory: nds
        run: |
          pnpm install --frozen-lockfile
          pnpm build:tokens
          pnpm --filter @nordlig/components build

      - name: Pack and copy tarballs
        run: |
          # Read versions from package.json
          COMP_VER=$(node -p "require('./nds/packages/components/package.json').version")
          STYLES_VER=$(node -p "require('./nds/packages/styles/package.json').version")

          cd nds/packages/components && pnpm pack && cd ../../..
          cd nds/packages/styles && pnpm pack && cd ../../..

          # Remove old tarballs
          rm -f frontend/packages/nordlig-components-*.tgz
          rm -f frontend/packages/nordlig-styles-*.tgz

          # Copy exact version tarballs
          cp "nds/packages/components/nordlig-components-${COMP_VER}.tgz" frontend/packages/
          cp "nds/packages/styles/nordlig-styles-${STYLES_VER}.tgz" frontend/packages/

          # Update package.json references
          cd frontend
          sed -i "s|file:packages/nordlig-components-[^\"]*|file:packages/nordlig-components-${COMP_VER}.tgz|" package.json
          sed -i "s|file:packages/nordlig-styles-[^\"]*|file:packages/nordlig-styles-${STYLES_VER}.tgz|" package.json

          # Regenerate package-lock.json to avoid EINTEGRITY
          rm -f package-lock.json
          npm install --package-lock-only

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet frontend/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          NDS_SHA: ${{ github.event.client_payload.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/sync-nds-${NDS_SHA:0:7}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add frontend/packages/ frontend/package.json frontend/package-lock.json
          git commit -m "chore: sync NDS packages (${NDS_SHA:0:7})"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: sync NDS packages (${NDS_SHA:0:7})" \
            --body "Automatischer Sync der Nordlig Design System Packages von NCS23/nordlig-design-system@${NDS_SHA:0:7}."
